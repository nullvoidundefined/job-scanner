# Pre-commit formats staged files only (fast). Full verification runs at
# pre-push: typecheck, tests, build.
pre-commit:
  parallel: true
  commands:
    format:
      glob: '*.{ts,mjs,cjs,js,json,md,yml,yaml}'
      run: npx prettier --write {staged_files}
      stage_fixed: true

pre-push:
  commands:
    typecheck:
      run: npm run typecheck
    test:
      run: npm test
    build:
      run: npm run build
